<!DOCTYPE html>
<html>
<head>
  <title>Cyber Awareness</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">

  <style>
    html, body {
      margin: 0;
      padding: 0;
      width: 100%;
      height: 100%;
      background: black;
      overflow: hidden;
      font-family: Arial, sans-serif;
    }

    .gif {
      width: 100vw;
      height: 100dvh;
      object-fit: contain;
      background: black;
      display: block;
    }

    .message {
      display: none;
      width: 100vw;
      height: 100dvh;
      background: black;
      color: white;
      text-align: center;
      padding: 28vh 24px 0;
      box-sizing: border-box;
      font-size: 24px;
      line-height: 1.5;
    }

    .message strong {
      font-size: 28px;
    }
  </style>
</head>

<body>

  <img src="hack.gif" class="gif" id="gif">

  <div class="message" id="message">
    <strong>Relax.</strong><br><br>
    nothing was hacked !!<br>
  </div>

  <script>
    setTimeout(function() {
      document.getElementById("gif").style.display = "none";
      document.getElementById("message").style.display = "block";
    }, 6000);
  </script>

</body>
</html>
