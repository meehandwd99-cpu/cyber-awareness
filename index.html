<!DOCTYPE html>
<html>
<head>
  <title>Cyber Awareness</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    html, body {
      margin: 0;
      padding: 0;
      width: 100%;
      height: 100%;
      overflow: hidden;
      font-family: Arial, sans-serif;
      background: black;
    }

    #screen {
      width: 100vw;
      height: 100vh;
      background: url("background.png") center center / cover no-repeat;
      display: flex;
      justify-content: center;
      align-items: center;
      text-align: center;
      color: red;
      animation: flash 0.7s infinite;
    }

    #content {
      background: rgba(0, 0, 0, 0.65);
      padding: 25px;
      border-radius: 15px;
      width: 85%;
    }

    h1 {
      font-size: 34px;
      text-shadow: 0 0 15px red;
      animation: blink 0.6s infinite;
    }

    #status {
      font-size: 24px;
      color: white;
    }

    #message {
      display: none;
      width: 100vw;
      height: 100vh;
      background: black;
      color: white;
      text-align: center;
      padding: 28vh 25px 0;
      box-sizing: border-box;
      font-size: 24px;
      line-height: 1.5;
    }

    @keyframes blink {
      50% { opacity: 0.2; }
    }

    @keyframes flash {
      50% { box-shadow: inset 0 0 90px red; }
    }
  </style>
</head>

<body>

  <div id="screen">
    <div id="content">
      <h1>⚠ SECURITY ALERT ⚠</h1>
      <p id="status">Scanning...</p>
    </div>
  </div>

  <div id="message">
    <strong>Relax, nothing was hacked.</strong><br><br>
      Always Think before you scan... <br><br>
  </div>

  <script>
    const messages = [
      "Scanning...",
      "Checking Personal Information...",
      "hacking the device in 3...",
      "hacking the device in 2...",
      "hacking the device in 1...",
      "hacked successfully!"
    ];

    let i = 0;
    const status = document.getElementById("status");

    const interval = setInterval(function() {
      i++;
      if (i < messages.length) {
        status.innerText = messages[i];
      }
    }, 1500);

    setTimeout(function() {
      clearInterval(interval);
      document.getElementById("screen").style.display = "none";
      document.getElementById("message").style.display = "block";
    }, 12000);
  </script>

</body>
</html>
